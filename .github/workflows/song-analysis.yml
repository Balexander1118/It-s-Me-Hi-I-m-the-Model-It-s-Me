name: Song Analysis CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache spaCy model data to avoid re-downloading
      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: ~/.cache/spacy
          key: spacy-${{ runner.os }}-en_core_web_sm-v1

      - name: Download spaCy model (if not cached)
        run: python -m spacy download en_core_web_sm

      - name: Validate ontology YAML
        run: python -c "import yaml; yaml.safe_load(open('config/ontology.yml'))"

      # Optional but recommended: lint
      - name: Lint (ruff)
        run: |
          ruff --version
          ruff check .

      # Optional but recommended: run tests
      - name: Run tests
        run: pytest -q

      - name: Run analysis on sample songs
        run: |
          mkdir -p results
          python scripts/analyze_songs.py \
            --input data/sample/ \
            --output results/

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
